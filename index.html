<!-- JavaScript to toggle the section content on click -->
<script>
    // Get all the section headers
    const headers = document.querySelectorAll('.section-header');
    // Add a click event listener to each header
headers.forEach(header => {

    if (header.querySelector("a")) {
        return;
    }

    header.addEventListener('click', () => {            // Toggle the display of the associated section content
            const content = header.nextElementSibling;
            const computedDisplay = getComputedStyle(content).display;

            if (content.classList && content.classList.contains('merch-gallery')) {
                // Merch gallery: toggle between flex and none
                if (computedDisplay === "flex") {
                    content.style.display = "none";
                } else {
                    content.style.display = "flex";
                }
            } else {
                // Other sections: toggle between block and none
                if (computedDisplay === "block") {
                    content.style.display = "none";
                } else {
                    content.style.display = "block";
                }
            }
        });
    });
</script>
